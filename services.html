<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب خدمة - شركة fix</title>
    <link rel="stylesheet" href="style.css">
    <style>
        header {
            background-color: #ffffff;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>
<header>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%; height: 90px;">
        
        <div id="branding">
            <a href="index.html" style="
                display: block;
                width: 180px; 
                height: 90px; 
                background-image: url('FullLogo.jpg.jpeg');
                background-size: 140%; 
                background-position: center center;
                background-repeat: no-repeat;
                mix-blend-mode: multiply;
            " title="الرئيسية"></a>
        </div>
        
        <nav style="display: flex; align-items: center; gap: 20px;">
            <ul class="nav-links" style="display: flex; gap: 20px; list-style: none; margin: 0; padding: 0;">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="services.html">الخدمات</a></li>
                <li><a href="about.html">من نحن</a></li>
                <li><a href="contact.html">اتصل بنا</a></li>
            </ul>
            
            <div id="auth-section" style="display: flex; gap: 15px; align-items: center;">
            </div>
        </nav>
    </div>
</header>

    <main class="container">
        <div class="service-form-card" style="padding: 40px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 50px auto;">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--primary);">اختيار الخدمة</h2>
            <form action="/request-service" method="POST">
                <div id="services-container">
                    <p style="text-align: center; color: var(--accent);">جاري تحميل الخدمات...</p>
                </div>
                <button type="submit" style="margin-top: 20px; width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">تأكيد طلب الخدمة</button>
            </form>
        </div>
    </main>

    <footer style="text-align: center; padding: 20px; margin-top: 50px;">
        <p>شركة fix للخدمات المنزلية المتكاملة © 2026</p>
    </footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        
       
        fetch('/api/user-info?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const authSection = document.getElementById('auth-section');
                if (!authSection) return;

                if (data.name && data.name !== 'ضيف') {
                    let dynamicLinks = '';
                    if (data.userType === 'Client') {
                        dynamicLinks = `<a href="my-requests.html" style="color: var(--primary); font-weight: bold; text-decoration: none;">طلباتي</a>`;
                    } else if (data.userType === 'Technician') {
                        dynamicLinks = `<a href="technician.html" style="color: var(--primary); font-weight: bold; text-decoration: none;">المهام الفنية</a>`;
                    } else if (data.userType === 'Admin') {
                        dynamicLinks = `<a href="admin.html" style="color: var(--primary); font-weight: bold; text-decoration: none;">لوحة الإدارة</a>`;
                    }

                    authSection.innerHTML = `
                        <div style="display:flex; align-items:center; gap:15px; border-right: 2px solid var(--border-color); padding-right: 15px;">
                            <span style="color: var(--accent); font-weight: bold;">مرحباً، ${data.name} ✨</span>
                            ${dynamicLinks}
                            <a href="/auth/logout" style="color: #ef4444; border: 1px solid #ef4444; padding: 5px 15px; border-radius: 8px; text-decoration: none; transition: 0.3s;">خروج</a>
                        </div>
                    `;
                } else {
                    authSection.innerHTML = `
                        <div style="display:flex; align-items:center; gap:15px; border-right: 2px solid var(--border-color); padding-right: 15px;">
                            <a href="login.html" style="color: var(--primary); font-weight: bold; text-decoration: none;">دخول</a>
                            <a href="signup.html" class="btn" style="padding: 8px 20px; font-size: 1rem; color: white !important; margin: 0;">حساب جديد</a>
                        </div>
                    `;
                }
            })
            .catch(err => console.error("خطأ في التحقق من الجلسة:", err));

        
        const servicesContainer = document.getElementById('services-container');
        if (servicesContainer) {
            fetch('/api/services')
                .then(res => res.json())
                .then(data => {
                    if (data.length > 0) {
                        
                        servicesContainer.innerHTML = data.map(service => `
                            <label class="service-option">
                                <input type="radio" name="serviceId" value="${service.serviceId}" required style="width: auto; margin: 0; transform: scale(1.3);">
                                <div>
                                    <h4 style="margin-bottom: 5px; color: var(--primary);">${service.serviceName}</h4>
                                    <p style="font-size: 0.9rem; margin:0; color: var(--text-muted);">خدمة احترافية مضمونة من هوم فكس</p>
                                </div>
                            </label>
                        `).join('');
                    } else {
                        servicesContainer.innerHTML = '<p style="text-align:center;">لا توجد خدمات متاحة حالياً.</p>';
                    }
                })
                .catch(err => {
                    console.error("خطأ في الاتصال:", err);
                    servicesContainer.innerHTML = '<p style="color:red; text-align:center;">حدث خطأ أثناء تحميل الخدمات.</p>';
                });
        }
    });
    </script>
</body>
</html>
