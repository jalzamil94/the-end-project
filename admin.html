<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
    // فحص الهوية فور تحميل الصفحة
    fetch('/api/user-info').then(res => res.json()).then(user => {
        if (user.userType !== 'Admin') {
            window.location.href = 'login.html'; // طرده لصفحة الدخول إذا لم يكن مديراً
        }
    });
</script>
    <meta charset="UTF-8">
    <title>لوحة التحكم الشاملة - شركة الزامل</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { padding: 12px 25px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: #0f172a; font-weight: bold; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .status-Blocked { color: #ef4444; font-weight: bold; }
        .status-Active { color: #10b981; font-weight: bold; }
        /* تحسين مظهر القائمة المنسدلة */
        .tech-select { background: #1e293b; color: white; border: 1px solid var(--accent); padding: 5px; border-radius: 8px; cursor: pointer; outline: none; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div id="branding">
                <h1>لوحة الإدارة <span style="color:var(--accent)">المركزية</span></h1>
            </div>
            <nav><a href="/auth/logout" style="color: #ef4444; text-decoration: none;">خروج</a></nav>
        </div>
    </header>

    <main class="container" style="padding: 40px 0;">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('requests-sec', this)">📦 إدارة الطلبات</button>
            <button class="tab-btn" onclick="showTab('users-sec', this)">👥 إدارة المستخدمين</button>
        </div>

        <section id="requests-sec" class="admin-section active">
            <div class="glass-card" style="padding: 20px;">
                <h3>سجل طلبات الصيانة</h3>
                <table style="width: 100%; text-align: right; margin-top: 20px;">
                    <thead style="color: var(--accent);">
                        <tr><th>رقم الطلب</th><th>الخدمة</th><th>الحالة / تعيين فني</th></tr>
                    </thead>
                    <tbody id="requests-table"></tbody>
                </table>
            </div>
        </section>

        <section id="users-sec" class="admin-section">
            <div class="glass-card" style="padding: 20px;">
                <h3>قائمة المستخدمين في النظام</h3>
                <table style="width: 100%; text-align: right; margin-top: 20px;">
                    <thead style="color: var(--accent);">
                        <tr><th>الاسم</th><th>الجوال</th><th>النوع</th><th>الحالة</th><th>إجراء</th></tr>
                    </thead>
                    <tbody id="users-table"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let techniciansList = []; // لتخزين قائمة الفنيين عالمياً

        function showTab(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'users-sec') loadUsers();
            else loadRequests();
        }

        // دالة جديدة لجلب الفنيين فقط
        async function fetchTechnicians() {
            const res = await fetch('/api/admin/technicians');
            techniciansList = await res.json();
        }

        async function loadRequests() {
            await fetchTechnicians(); // جلب الفنيين أولاً لملء القوائم المنسدلة

            fetch('/api/admin/requests').then(res => res.json()).then(data => {
                const table = document.getElementById('requests-table');
                table.innerHTML = data.map(req => {
                    
                    // إذا كان الطلب قيد الانتظار، نعرض قائمة الفنيين
                    let statusContent = `<span class="status-badge">${req.Status}</span>`;
                    
                    if (req.Status === 'Pending') {
                        let options = `<option value="">تعيين فني...</option>`;
                        options += techniciansList.map(t => `<option value="${t.UserID}">${t.Name}</option>`).join('');
                        
                        statusContent = `
                            <select class="tech-select" onchange="assignTech(${req.id}, this.value)">
                                ${options}
                            </select>
                        `;
                    }

                    return `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 15px;">#${req.id}</td>
                            <td>${req.ServiceName}</td>
                            <td>${statusContent}</td>
                        </tr>
                    `;
                }).join('');
            });
        }

        function assignTech(requestId, techId) {
            if (!techId) return;
            if (!confirm("هل تريد تعيين هذا الفني للطلب؟")) return;

            fetch('/api/admin/assign-tech', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ requestId, techId })
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    alert("تم تعيين الفني بنجاح");
                    loadRequests(); // إعادة تحميل الجدول لتحديث الحالة
                }
            });
        }

        function loadUsers() {
            fetch('/api/admin/users').then(res => res.json()).then(data => {
                const table = document.getElementById('users-table');
                table.innerHTML = data.map(user => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 15px;">${user.Name}</td>
                        <td>${user.Phone}</td>
                        <td>${user.UserType}</td>
                        <td class="status-${user.Status}">${user.Status === 'Active' ? 'نشط' : 'محظور'}</td>
                        <td>
                            <button onclick="toggleUser(${user.UserID}, '${user.Status}')" style="background: transparent; border: 1px solid ${user.Status === 'Active' ? '#ef4444' : '#10b981'}; color: ${user.Status === 'Active' ? '#ef4444' : '#10b981'}; padding: 5px 10px; border-radius: 8px; cursor: pointer;">
                                ${user.Status === 'Active' ? 'حظر' : 'تفعيل'}
                            </button>
                        </td>
                    </tr>
                `).join('');
            });
        }

        function toggleUser(userId, currentStatus) {
            const newStatus = currentStatus === 'Active' ? 'Blocked' : 'Active';
            if(!confirm(`هل أنت متأكد من ${newStatus === 'Blocked' ? 'حظر' : 'تفعيل'} هذا المستخدم؟`)) return;
            
            fetch('/api/admin/toggle-user-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, newStatus })
            }).then(() => loadUsers());
        }

        loadRequests();
    </script>
</body>
</html>
