<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - شركة fix للحلول المتكاملة</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ضمان خلفية بيضاء للهيدر لتناسق الشعار */
        header {
            background-color: #ffffff;
            position: relative;
            z-index: 10;
        }

        /* تنسيق البطاقة الزجاجية لتسجيل الدخول */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh; /* توسيط عمودي مثالي */
            padding: 20px;
        }

        .glass-auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 35px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            text-align: center;
        }

        .glass-auth-card h2 {
            font-size: 2.2rem;
            margin-bottom: 35px;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-auth-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 15px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.4s;
        }

        .glass-auth-card input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
        }

        .btn-full {
            width: 100%;
            padding: 15px;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .signup-link {
            margin-top: 25px;
            display: block;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .signup-link span {
            color: var(--accent);
            font-weight: bold;
        }

        .signup-link:hover span {
            text-decoration: underline;
        }
    </style>
</head>
<body>

 <header>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%; height: 90px;">
        
        <div id="branding">
            <a href="index.html" style="
                display: block;
                width: 180px; 
                height: 90px; 
                background-image: url('FullLogo.jpg.jpeg');
                background-size: 140%; 
                background-position: center center;
                background-repeat: no-repeat;
                mix-blend-mode: multiply;
            " title="الرئيسية"></a>
        </div>
        
        <nav style="display: flex; align-items: center; gap: 20px;">
            <ul class="nav-links" style="display: flex; gap: 20px; list-style: none; margin: 0; padding: 0;">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="services.html">الخدمات</a></li>
                <li><a href="about.html">من نحن</a></li>
                <li><a href="contact.html">اتصل بنا</a></li>
            </ul>
            
            <div id="auth-section" style="display: flex; gap: 15px; align-items: center;">
                </div>
        </nav>
    </div>
</header>

    <main class="auth-wrapper">
        <div class="glass-auth-card">
            <h2>مرحباً بك مجدداً</h2>
            <form action="/auth/login" method="POST">
                <input type="text" name="phone" placeholder="أدخل رقم الهاتف" required>
                <input type="password" name="password" placeholder="أدخل كلمة المرور" required>

                <button type="submit" class="btn-signup btn-full">دخول</button>
            </form>
            
            <a href="signup.html" class="signup-link">ليس لديك حساب؟ <span>سجل الآن</span></a>
        </div>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة لشركة fix للحلول المتكاملة © 2026</p>
    </footer>

</body>
</html>
